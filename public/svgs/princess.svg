<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Hair (drawn first so face covers center) -->
  <path data-region="hair"
    d="M 148 80 Q 100 108 96 170 Q 90 232 105 295 Q 115 340 122 372 Q 136 388 150 378 Q 158 355 158 322 Q 160 278 163 242 Q 166 198 170 168 Q 178 132 195 112 Q 212 132 222 168 Q 226 198 229 242 Q 232 278 234 322 Q 234 355 242 378 Q 256 388 270 372 Q 277 340 287 295 Q 302 232 296 170 Q 292 108 252 80 Q 232 62 195 58 Q 158 62 148 80 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Face -->
  <circle data-region="face" cx="195" cy="132" r="54"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5"/>

  <!-- Crown (on top of face) -->
  <polygon data-region="crown"
    points="148,82 163,40 178,72 195,22 212,72 227,40 242,82"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Crown gems -->
  <circle cx="195" cy="44" r="9" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3" pointer-events="none"/>
  <circle cx="165" cy="60" r="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <circle cx="225" cy="60" r="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>

  <!-- Eyes -->
  <circle cx="178" cy="124" r="11" fill="#1a1a1a" pointer-events="none"/>
  <circle cx="212" cy="124" r="11" fill="#1a1a1a" pointer-events="none"/>
  <circle cx="181" cy="120" r="4" fill="#FFFFFF" pointer-events="none"/>
  <circle cx="215" cy="120" r="4" fill="#FFFFFF" pointer-events="none"/>
  <!-- Eyelashes -->
  <line x1="169" y1="112" x2="173" y2="104" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="178" y1="108" x2="178" y2="100" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="187" y1="112" x2="191" y2="104" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="203" y1="112" x2="207" y2="104" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="212" y1="108" x2="212" y2="100" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="221" y1="112" x2="225" y2="104" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <!-- Nose -->
  <ellipse cx="195" cy="144" rx="5" ry="4" fill="#1a1a1a" pointer-events="none"/>
  <!-- Smile -->
  <path d="M 183 156 Q 195 170 207 156" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <!-- Rosy cheeks -->
  <ellipse cx="163" cy="150" rx="14" ry="9" fill="#FFB3C6" opacity="0.5" pointer-events="none"/>
  <ellipse cx="227" cy="150" rx="14" ry="9" fill="#FFB3C6" opacity="0.5" pointer-events="none"/>

  <!-- Bodice -->
  <path data-region="bodice"
    d="M 160 183 Q 150 198 150 220 L 150 264 Q 165 274 195 274 Q 225 274 240 264 L 240 220 Q 240 198 230 183 Q 212 174 195 174 Q 178 174 160 183 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Left Sleeve -->
  <path data-region="left-sleeve"
    d="M 160 183 Q 133 190 120 212 Q 108 234 115 256 Q 122 268 140 264 Q 150 262 150 264 L 150 220 Q 150 198 160 183 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Right Sleeve -->
  <path data-region="right-sleeve"
    d="M 230 183 Q 257 190 270 212 Q 282 234 275 256 Q 268 268 250 264 Q 240 262 240 264 L 240 220 Q 240 198 230 183 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Belt -->
  <path data-region="belt"
    d="M 150 264 Q 165 278 195 278 Q 225 278 240 264 L 240 282 Q 225 296 195 296 Q 165 296 150 282 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Belt buckle -->
  <rect x="185" y="268" width="20" height="15" rx="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>

  <!-- Skirt -->
  <path data-region="skirt"
    d="M 150 282 Q 112 312 90 366 Q 76 398 82 400 L 308 400 Q 314 398 300 366 Q 278 312 240 282 Q 222 296 195 296 Q 168 296 150 282 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Skirt decorative seams -->
  <path d="M 168 298 Q 160 348 163 398" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.2" pointer-events="none"/>
  <path d="M 222 298 Q 230 348 227 398" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.2" pointer-events="none"/>
  <path d="M 195 296 L 195 400" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.2" pointer-events="none"/>

  <!-- Left Shoe -->
  <ellipse data-region="left-shoe" cx="118" cy="395" rx="34" ry="11"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5"/>

  <!-- Right Shoe -->
  <ellipse data-region="right-shoe" cx="272" cy="395" rx="34" ry="11"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5"/>

  <!-- Wand Handle (closed polygon strip from right hand to star) -->
  <!-- From ~(268,250) to star at (345,68): perp offset 7px -->
  <polygon data-region="wand-handle"
    points="262,246 339,64 351,70 274,252"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>

  <!-- Wand Star (5-point, centre at 345,65) -->
  <polygon data-region="wand-star"
    points="345,43 351,59 368,59 355,70 360,87 345,77 330,87 335,70 322,59 339,59"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Sparkle lines around star -->
  <line x1="345" y1="27" x2="345" y2="35" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="377" y1="42" x2="371" y2="46" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="313" y1="42" x2="319" y2="46" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
</svg>
