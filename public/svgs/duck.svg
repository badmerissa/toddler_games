  <!-- Feet (decorative) -->
  <path d="M 160 370 Q 145 385 130 375 M 160 370 Q 160 385 145 380 M 160 370 Q 170 380 158 388" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" pointer-events="none"/>
  <path d="M 230 372 Q 215 387 200 377 M 230 372 Q 230 387 215 382 M 230 372 Q 240 382 228 390" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" pointer-events="none"/>
