  <ellipse data-region="wing" cx="155" cy="285" rx="55" ry="38" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" transform="rotate(-10 155 285)"/>
  <!-- Head -->
  <circle data-region="head" cx="280" cy="170" r="60" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Neck connector (decorative outline only) -->
  <path d="M 255 220 Q 260 240 230 255" fill="none" stroke="#1a1a1a" stroke-width="5" pointer-events="none"/>
  <!-- Beak -->
