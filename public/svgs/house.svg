<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Roof -->
  <polygon data-region="roof" points="200,60 50,200 350,200" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Wall -->
  <rect data-region="wall" x="70" y="200" width="260" height="170" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Door -->
  <rect data-region="door" x="163" y="270" width="74" height="100" rx="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Left window -->
  <rect data-region="window-left" x="88" y="225" width="68" height="60" rx="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Right window -->
  <rect data-region="window-right" x="244" y="225" width="68" height="60" rx="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Chimney -->
  <rect data-region="chimney" x="270" y="88" width="38" height="80" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Window crosses (decorative) -->
  <line x1="122" y1="225" x2="122" y2="285" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <line x1="88" y1="255" x2="156" y2="255" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <line x1="278" y1="225" x2="278" y2="285" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <line x1="244" y1="255" x2="312" y2="255" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <!-- Door knob -->
  <circle cx="228" cy="323" r="5" fill="#1a1a1a" pointer-events="none"/>
  <!-- Path to door -->
  <path d="M 163 370 Q 145 385 135 370" fill="none" stroke="#1a1a1a" stroke-width="3" pointer-events="none"/>
  <path d="M 237 370 Q 255 385 265 370" fill="none" stroke="#1a1a1a" stroke-width="3" pointer-events="none"/>
</svg>
