  <!-- Right lobe of apple -->
  <path data-region="apple-right" d="M 200 130 Q 280 90 300 160 Q 320 240 250 300 Q 225 325 200 330 Q 225 280 225 220 Q 225 175 200 130 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Leaf -->
  <path data-region="leaf" d="M 210 95 Q 250 50 280 70 Q 260 110 210 95 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Stem -->
  <line x1="205" y1="95" x2="205" y2="60" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round" pointer-events="none"/>
  <!-- Shine -->
  <ellipse data-region="shine" cx="145" cy="175" rx="28" ry="18" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3" transform="rotate(-20 145 175)"/>
  <!-- Leaf vein -->
