  <!-- Eye -->
  <circle cx="100" cy="185" r="22" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" pointer-events="none"/>
  <circle cx="100" cy="185" r="12" fill="#1a1a1a" pointer-events="none"/>
  <circle cx="95" cy="180" r="4" fill="#FFFFFF" pointer-events="none"/>
