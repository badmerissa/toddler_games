  <path d="M 195 175 Q 210 160 225 175" fill="none" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <path d="M 230 175 Q 245 160 260 175" fill="none" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <path d="M 145 200 Q 160 185 175 200" fill="none" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <path d="M 180 200 Q 195 185 210 200" fill="none" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <path d="M 215 200 Q 230 185 245 200" fill="none" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
  <path d="M 250 200 Q 265 185 280 200" fill="none" stroke="#1a1a1a" stroke-width="2.5" pointer-events="none"/>
