<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Sky -->
  <rect data-region="sky" x="0" y="0" width="400" height="230"
    fill="#FFFFFF" stroke="none"/>

  <!-- Sun -->
  <circle data-region="sun" cx="338" cy="65" r="42"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Sun rays -->
  <line x1="338" y1="10" x2="338" y2="2" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="374" y1="24" x2="380" y2="18" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="393" y1="62" x2="401" y2="62" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="374" y1="100" x2="380" y2="108" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="302" y1="24" x2="296" y2="18" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="283" y1="62" x2="275" y2="62" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>

  <!-- Cloud -->
  <path data-region="cloud"
    d="M 52 72 Q 44 52 58 45 Q 65 38 78 45 Q 82 32 96 32 Q 110 32 116 44 Q 128 40 134 52 Q 142 62 132 72 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Sea / water -->
  <path data-region="sea"
    d="M 0 200 Q 50 190 100 200 Q 150 210 200 200 Q 250 190 300 200 Q 350 210 400 200 L 400 310 L 0 310 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Wave crests (decorative) -->
  <path d="M 20 215 Q 50 205 80 215" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" pointer-events="none"/>
  <path d="M 150 222 Q 180 212 210 222" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" pointer-events="none"/>
  <path d="M 280 218 Q 310 208 340 218" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" pointer-events="none"/>
  <path d="M 60 242 Q 90 232 120 242" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>
  <path d="M 210 250 Q 245 240 275 250" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>

  <!-- Sand -->
  <path data-region="sand"
    d="M 0 300 Q 50 295 100 300 Q 150 305 200 300 Q 250 295 300 300 Q 350 305 400 300 L 400 400 L 0 400 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Sand ripples -->
  <path d="M 20 340 Q 70 334 120 340" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.2" pointer-events="none"/>
  <path d="M 240 360 Q 290 354 340 360" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.2" pointer-events="none"/>

  <!-- Bucket -->
  <path data-region="bucket"
    d="M 68 312 Q 62 340 62 372 Q 70 388 95 390 Q 120 388 128 372 Q 128 340 122 312 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Bucket handle -->
  <path d="M 68 315 Q 95 295 122 315" fill="none" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round" pointer-events="none"/>
  <!-- Bucket stripe -->
  <path d="M 63 345 Q 95 340 127 345" fill="none" stroke="#1a1a1a" stroke-width="3.5" pointer-events="none"/>

  <!-- Spade -->
  <rect data-region="spade" x="152" y="305" width="18" height="85" rx="6"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5"/>
  <!-- Spade blade -->
  <path data-region="spade-blade"
    d="M 140 308 Q 140 280 161 272 Q 182 280 182 308 Q 182 325 161 330 Q 140 325 140 308 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Spade grip at top -->
  <rect x="144" y="386" width="34" height="14" rx="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" pointer-events="none"/>

  <!-- Starfish -->
  <polygon data-region="starfish"
    points="240,340 248,358 268,358 252,370 258,390 240,378 222,390 228,370 212,358 232,358"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Crab body -->
  <ellipse data-region="crab-body" cx="318" cy="348" rx="38" ry="28"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Crab eyes (stalks) -->
  <line x1="306" y1="320" x2="302" y2="308" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="330" y1="320" x2="334" y2="308" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <circle cx="301" cy="306" r="6" fill="#1a1a1a" pointer-events="none"/>
  <circle cx="335" cy="306" r="6" fill="#1a1a1a" pointer-events="none"/>
  <!-- Crab smile -->
  <path d="M 308 356 Q 318 365 328 356" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" pointer-events="none"/>
  <!-- Crab walking legs (3 per side, decorative) -->
  <line x1="285" y1="342" x2="272" y2="335" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="282" y1="350" x2="268" y2="350" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="285" y1="358" x2="272" y2="368" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="351" y1="342" x2="364" y2="335" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="354" y1="350" x2="368" y2="350" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
  <line x1="351" y1="358" x2="364" y2="368" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>

  <!-- Crab Left Claw -->
  <path data-region="crab-left-claw"
    d="M 280 332 Q 260 312 252 318 Q 244 328 252 338 Q 258 345 268 340 Q 275 338 280 332 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Claw pincer -->
  <path d="M 252 318 Q 246 308 252 304 Q 256 312 262 316" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" pointer-events="none"/>

  <!-- Crab Right Claw -->
  <path data-region="crab-right-claw"
    d="M 356 332 Q 376 312 384 318 Q 392 328 384 338 Q 378 345 368 340 Q 361 338 356 332 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Claw pincer -->
  <path d="M 384 318 Q 390 308 384 304 Q 380 312 374 316" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" pointer-events="none"/>
</svg>
