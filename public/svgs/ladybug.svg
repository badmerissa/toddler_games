<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Grass strip at bottom -->
  <rect data-region="grass" x="0" y="338" width="400" height="62"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Grass blades (decorative) -->
  <path d="M 30 338 Q 28 318 35 308 Q 40 320 42 338" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round" pointer-events="none"/>
  <path d="M 55 338 Q 50 312 58 298 Q 65 314 65 338" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round" pointer-events="none"/>
  <path d="M 340 338 Q 338 316 345 305 Q 350 318 352 338" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round" pointer-events="none"/>
  <path d="M 365 338 Q 360 315 368 302 Q 374 317 375 338" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round" pointer-events="none"/>

  <!-- Twig / stem the ladybug sits on -->
  <rect x="152" y="325" width="96" height="18" rx="8"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4" pointer-events="none"/>

  <!-- Main leaf (large, ladybug sits on it) -->
  <path data-region="leaf"
