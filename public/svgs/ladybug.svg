    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <!-- Leaf midrib -->
  <path d="M 200 175 L 200 378" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.3" pointer-events="none"/>
  <!-- Side veins -->
  <path d="M 200 220 Q 155 228 125 215" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.25" pointer-events="none"/>
  <path d="M 200 260 Q 145 272 112 255" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.25" pointer-events="none"/>
  <path d="M 200 300 Q 152 318 122 305" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.25" pointer-events="none"/>
  <path d="M 200 220 Q 245 228 275 215" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.25" pointer-events="none"/>
  <path d="M 200 260 Q 255 272 288 255" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.25" pointer-events="none"/>
  <path d="M 200 300 Q 248 318 278 305" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.25" pointer-events="none"/>

  <!-- Left Wing -->
  <path data-region="left-wing"
    d="M 200 188 Q 168 188 148 208 Q 122 235 122 272 Q 122 308 145 325 Q 162 335 184 333 Q 196 332 200 328 L 200 188 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Right Wing -->
  <path data-region="right-wing"
    d="M 200 188 Q 232 188 252 208 Q 278 235 278 272 Q 278 308 255 325 Q 238 335 216 333 Q 204 332 200 328 L 200 188 Z"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>

  <!-- Centre line between wings (decorative) -->
  <line x1="200" y1="188" x2="200" y2="328" stroke="#1a1a1a" stroke-width="4" pointer-events="none"/>

  <!-- Spots — LEFT wing (3 spots) -->
  <circle data-region="spot-tl" cx="165" cy="228" r="20"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <circle data-region="spot-ml" cx="152" cy="278" r="18"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <circle data-region="spot-bl" cx="163" cy="318" r="15"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3.5"/>

  <!-- Spots — RIGHT wing (3 spots) -->
  <circle data-region="spot-tr" cx="235" cy="228" r="20"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <circle data-region="spot-mr" cx="248" cy="278" r="18"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <circle data-region="spot-br" cx="237" cy="318" r="15"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3.5"/>

  <!-- Head -->
  <circle data-region="head" cx="200" cy="172" r="42"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5"/>

  <!-- Eyes -->
  <circle cx="184" cy="164" r="10" fill="#1a1a1a" pointer-events="none"/>
  <circle cx="216" cy="164" r="10" fill="#1a1a1a" pointer-events="none"/>
  <circle cx="187" cy="161" r="4" fill="#FFFFFF" pointer-events="none"/>
  <circle cx="219" cy="161" r="4" fill="#FFFFFF" pointer-events="none"/>
  <!-- Smile -->
  <path d="M 188 184 Q 200 196 212 184" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>

  <!-- Antennae (decorative) -->
  <path d="M 188 132 Q 175 110 162 98" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" pointer-events="none"/>
  <path d="M 212 132 Q 225 110 238 98" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" pointer-events="none"/>
  <circle cx="160" cy="96" r="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3.5" pointer-events="none"/>
  <circle cx="240" cy="96" r="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3.5" pointer-events="none"/>
</svg>
